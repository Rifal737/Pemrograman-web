<!DOCTYPE html>
<html>
<head>
<title>form</title>
</head>
<body>
<form action="#" method="post">
 <label for="email">Email:</label>
 <input type="email" id="email" name="email" required placeholder="contoh@email.com">

 <label for="usia">Usia (18-60):</label>
 <input type="number" id="usia" name="usia" min="18" max="60" required>

 <label for="kode">Kode Pos (5 digit):</label>
 <input type="text" id="kode" name="kode" pattern="\d{5}" placeholder="12345">

 <button type="submit">Kirim</button>
</form>
</body>
</html>
